<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Link Gallery with Tags</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: #f4f4f4;
  }

  h1 {
    margin-bottom: 10px;
  }

  .form {
    display: grid;
    gap: 10px;
    max-width: 600px;
    margin-bottom: 20px;
  }

  input {
    padding: 10px;
    font-size: 14px;
  }

  button {
    padding: 10px;
    cursor: pointer;
    background: #333;
    color: white;
    border: none;
  }

  button:hover {
    background: #555;
  }

  .search {
    max-width: 600px;
    margin-bottom: 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 15px;
  }

  .card {
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    text-decoration: none;
    color: black;
    display: flex;
    flex-direction: column;
  }

  .card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
  }

  .card-title {
    padding: 8px 10px 2px;
    font-weight: bold;
    font-size: 14px;
    text-align: center;
  }

  .tags {
    padding: 0 10px 10px;
    font-size: 11px;
    color: #666;
    text-align: center;
  }

  .delete-btn {
    font-size: 11px;
    color: red;
    cursor: pointer;
    text-align: center;
    padding-bottom: 10px;
  }

  .meta {
    font-size: 11px;
    color: #777;
    text-align: center;
    padding-bottom: 5px;
  }
</style>
</head>

<body>

<h1>Link Gallery</h1>

<div class="form">
  <input id="title" placeholder="Title" />
  <input id="url" placeholder="Main URL (https://...)" />
  <input id="thumb" placeholder="Thumbnail Image URL" />
  <input id="tags" placeholder="Tags (comma separated, e.g. steel, tekla, design)" />
  <button onclick="addItem()">Add</button>
</div>

<div class="search">
  <input id="search" placeholder="Search titles or tags..." oninput="render()" />
</div>

<div class="grid" id="grid"></div>

<script>
  const STORAGE_KEY = "savedLinksTags";

  function getItems() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  }

  function saveItems(items) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function normalizeTags(tagString) {
    return tagString
      .split(",")
      .map(t => t.trim().toLowerCase())
      .filter(Boolean);
  }

  function addItem() {
    const title = document.getElementById("title").value.trim();
    const url = document.getElementById("url").value.trim();
    const thumb = document.getElementById("thumb").value.trim();
    const tagsRaw = document.getElementById("tags").value;

    if (!title || !url || !thumb) {
      alert("Fill title, url and thumbnail");
      return;
    }

    const items = getItems();

    items.push({
      id: Date.now(),
      title,
      url,
      thumb,
      tags: normalizeTags(tagsRaw)
    });

    saveItems(items);

    document.getElementById("title").value = "";
    document.getElementById("url").value = "";
    document.getElementById("thumb").value = "";
    document.getElementById("tags").value = "";

    render();
  }

  function deleteItem(id) {
    let items = getItems().filter(i => i.id !== id);
    saveItems(items);
    render();
  }

  function matchesSearch(item, query) {
    if (!query) return true;

    const q = query.toLowerCase();

    const inTitle = item.title.toLowerCase().includes(q);
    const inTags = item.tags.some(tag => tag.includes(q));

    return inTitle || inTags;
  }

  function render() {
    const grid = document.getElementById("grid");
    const search = document.getElementById("search").value.trim();

    grid.innerHTML = "";

    const items = getItems().filter(item => matchesSearch(item, search));

    items.forEach(item => {
      const a = document.createElement("a");
      a.className = "card";
      a.href = item.url;
      a.target = "_blank";

      a.innerHTML = `
        <img src="${item.thumb}" />
        <div class="card-title">${item.title}</div>
        <div class="tags">${item.tags.join(", ")}</div>
        <div class="delete-btn" onclick="event.preventDefault(); deleteItem(${item.id})">delete</div>
      `;

      grid.appendChild(a);
    });
  }

  render();
</script>

</body>
</html>
