<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Link Gallery Pro+</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: #f4f4f4;
  }

  h1 { margin-bottom: 10px; }

  .form, .toolbar {
    display: grid;
    gap: 10px;
    max-width: 700px;
    margin-bottom: 15px;
  }

  input {
    padding: 10px;
    font-size: 14px;
  }

  button {
    padding: 10px;
    cursor: pointer;
    background: #333;
    color: white;
    border: none;
  }

  button:hover { background: #555; }

  .toolbar {
    grid-template-columns: 1fr auto auto;
    align-items: center;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 15px;
  }

  .card {
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .card a {
    text-decoration: none;
    color: inherit;
  }

  .thumb {
    width: 100%;
    height: 120px;
    object-fit: cover;
    background: #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #666;
    font-size: 12px;
  }

  .card-title {
    padding: 8px;
    font-weight: bold;
    font-size: 14px;
    text-align: center;
  }

  .tags {
    font-size: 11px;
    color: #666;
    text-align: center;
    padding-bottom: 5px;
  }

  .controls {
    display: flex;
    justify-content: space-between;
    padding: 5px 8px 10px;
    font-size: 11px;
  }

  .btn {
    cursor: pointer;
    color: #0077cc;
  }

  .delete {
    color: red;
  }

  .select {
    position: absolute;
    top: 6px;
    left: 6px;
    transform: scale(1.2);
    z-index: 2;
  }
</style>
</head>

<body>

<h1>Link Gallery Pro+</h1>

<div class="form">
  <input id="title" placeholder="Title" />
  <input id="url" placeholder="Main URL" />
  <input id="thumb" placeholder="Thumbnail URL (optional)" />
  <input id="tags" placeholder="Tags (comma separated)" />
  <button onclick="addItem()">Add</button>
</div>

<div class="toolbar">
  <input id="search" placeholder="Search titles or tags..." oninput="render()" />
  <button onclick="bulkDelete()">Delete Selected</button>
  <button onclick="clearAll()">Clear All</button>
</div>

<div class="grid" id="grid"></div>

<script>
  const STORAGE_KEY = "savedLinksProPlus";

  function getItems() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  }

  function saveItems(items) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function normalizeTags(str) {
    return (str || "")
      .split(",")
      .map(t => t.trim().toLowerCase())
      .filter(Boolean);
  }

  function addItem() {
    const title = titleEl().value.trim();
    const url = urlEl().value.trim();
    const thumb = thumbEl().value.trim();
    const tags = tagsEl().value;

    if (!title || !url) return alert("Title and URL are required");

    const items = getItems();

    items.push({
      id: Date.now(),
      title,
      url,
      thumb: thumb || null,
      tags: normalizeTags(tags)
    });

    saveItems(items);
    clearForm();
    render();
  }

  function editItem(id) {
    let items = getItems();
    const item = items.find(i => i.id === id);
    if (!item) return;

    const newTitle = prompt("Edit title", item.title);
    const newUrl = prompt("Edit URL", item.url);
    const newThumb = prompt("Edit thumbnail URL (leave blank for none)", item.thumb || "");
    const newTags = prompt("Edit tags (comma separated)", item.tags.join(", "));

    if (!newTitle || !newUrl) return;

    item.title = newTitle.trim();
    item.url = newUrl.trim();
    item.thumb = newThumb.trim() || null;
    item.tags = normalizeTags(newTags);

    saveItems(items);
    render();
  }

  function deleteItem(id) {
    saveItems(getItems().filter(i => i.id !== id));
    render();
  }

  function bulkDelete() {
    const checked = document.querySelectorAll(".select:checked");
    const ids = Array.from(checked).map(cb => Number(cb.dataset.id));

    if (!ids.length) return alert("No items selected");

    saveItems(getItems().filter(i => !ids.includes(i.id)));
    render();
  }

  function clearAll() {
    if (!confirm("Delete everything?")) return;
    localStorage.removeItem(STORAGE_KEY);
    render();
  }

  function matches(item, q) {
    if (!q) return true;
    q = q.toLowerCase();

    return item.title.toLowerCase().includes(q) ||
           item.tags.some(t => t.includes(q));
  }

  function render() {
    const grid = document.getElementById("grid");
    const q = searchEl().value.trim();

    grid.innerHTML = "";

    getItems()
      .filter(i => matches(i, q))
      .forEach(item => {
        const div = document.createElement("div");
        div.className = "card";

        const thumbContent = item.thumb
          ? `<img class="thumb" src="${item.thumb}" />`
          : `<div class="thumb">No thumbnail</div>`;

        div.innerHTML = `
          <input class="select" type="checkbox" data-id="${item.id}" />

          <a href="${item.url}" target="_blank">
            ${thumbContent}
          </a>

          <div class="card-title">${item.title}</div>
          <div class="tags">${item.tags.join(", ")}</div>

          <div class="controls">
            <span class="btn" onclick="editItem(${item.id})">edit</span>
            <span class="btn delete" onclick="deleteItem(${item.id})">delete</span>
          </div>
        `;

        grid.appendChild(div);
      });
  }

  function clearForm() {
    titleEl().value = "";
    urlEl().value = "";
    thumbEl().value = "";
    tagsEl().value = "";
  }

  function titleEl() { return document.getElementById("title"); }
  function urlEl() { return document.getElementById("url"); }
  function thumbEl() { return document.getElementById("thumb"); }
  function tagsEl() { return document.getElementById("tags"); }
  function searchEl() { return document.getElementById("search"); }

  render();
</script>

</body>
</html>
